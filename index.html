<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柒柒的作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .link-item {
            display: block;
            text-decoration: none;
            padding: 18px;
            margin: 15px 0;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .pdf-link {
            background-color: #e3f2fd;
            color: #1976d2;
        }
        .pdf-link:hover {
            background-color: #bbdefb;
        }
        .proto-link {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }
        .proto-link:hover {
            background-color: #e1bee7;
        }
        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>柒柒的作品集</h1>

        <!-- 这里之后替换成你的PDF链接 -->
        <a href="这里替换成你的PDF链接" target="_blank" class="link-item pdf-link">
            📄 查看项目报告 PDF
        </a>

        <!-- 这里替换成你的第一个Axure原型链接 -->
        <a href="这里替换成你的第一个Axure链接" target="_blank" class="link-item proto-link">
            🖥️ 搭子派移动端高保真原型
        </a>

        <!-- 这里替换成你的第二个Axure原型链接 -->
        <a href="这里替换成你的第二个Axure链接" target="_blank" class="link-item proto-link">
            🖥️ 第二个项目原型作品
        </a>

        <div class="footer">
            点击任意链接，即可在新标签页打开查看
        </div>
    </div>
</body>
</html>
