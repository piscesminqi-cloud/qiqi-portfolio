<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你好~ 这里是柒柒</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #e0e7ff, #fce7f3);
}

/* 主容器 */
.container {
    width: 100%;
    max-width: 560px;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 40px 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

/* 标题 */
h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-bottom: 30px;
}

/* 项目块 */
.project {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

.project:last-child {
    border-bottom: none;
}

/* 项目标题 */
.project-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
}

/* 描述 */
.desc {
    font-size: 14px;
    line-height: 1.6;
    color: #444;
    margin-bottom: 12px;
}

/* 按钮 */
.link-item {
    display: flex;
    align-items: center;
    gap: 12px;

    width: 100%;
    max-width: 320px;
    margin: 10px auto;

    padding: 14px 16px;
    border-radius: 14px;

    text-decoration: none;
    color: white;
    font-size: 14px;

    transition: all 0.25s ease;
}

/* 图标 */
.icon {
    width: 28px;
    display: flex;
    justify-content: center;
    font-size: 18px;
}

/* 颜色 */
.pdf {
    background: linear-gradient(135deg, #818cf8, #6366f1);
}

.proto {
    background: linear-gradient(135deg, #a78bfa, #8b5cf6);
}

.link-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* 底部 */
.tip {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>✨ 柒柒的作品集</h1>
        <div class="subtitle">产品设计 / PRD / 原型</div>

        <!-- 项目1 -->
        <div class="project">
            <div class="project-title">📄 基于保险条款的智能问答系统PRD文档</div>
            <div class="desc">
                基于保险条款构建的智能问答系统，为内外用户提供高效问答，降本提效、提升查询效率与理解体验。
            </div>

            <a href="https://piscesminqi-cloud.github.io/qiqi-portfolio/PRD文档.pdf"
               target="_blank"
               class="link-item pdf">
                <span class="icon">📄</span>
                <span>查看 PRD 文档</span>
            </a>
        </div>

        <!-- 项目2 -->
        <div class="project">
            <div class="project-title">🎯 搭子派（兴趣社交产品）</div>
            <div class="desc">
                面向年轻人的兴趣社交平台，通过“搭子匹配”机制连接用户，降低社交门槛，提升线下活动参与效率与体验。
            </div>

            <a href="https://qhtunu.axshare.com/?g=4"
               target="_blank"
               class="link-item proto">
                <span class="icon">📱</span>
                <span>移动端原型</span>
            </a>

            <a href="https://5958rh.axshare.com/?g=4"
               target="_blank"
               class="link-item proto">
                <span class="icon">🖥️</span>
                <span>PC端原型</span>
            </a>
        </div>

        <div class="tip">
            点击按钮将在新标签页打开 💫
        </div>

    </div>
</div>

</body>
</html>
