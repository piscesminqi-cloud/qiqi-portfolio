<!DOCTYPE html>

<head>

    <title>柒柒的作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #f7f8fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;

            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #1f2328;
            margin-bottom: 35px;
            font-size: 26px;
            font-weight: 600;
        }
        .link-item {
            display: block;
            text-decoration: none;
            padding: 16px 20px;
            margin: 15px 0;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            transition: all 0.2s ease;
            color: white;
        }
        .pdf-link {
            background-color: #2f80ed;
        }
        .pdf-link:hover {
            background-color: #2b72d8;
        }
        .proto-link {
            background-color: #9b51e0;
        }
        .proto-link:hover {
            background-color: #8c45cc;
        }
        .tip {
            margin-top: 30px;
            color: #656d76;
            font-size: 13px;
        }

</head>
